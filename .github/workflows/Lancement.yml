name: Lancer programme Java

on:
  push:
    branches: [ master ]

#env:
#  - name: REGISTRY
#    value: ghcr.io
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
    JobBuild:
      name: Lint
      runs-on: ubuntu-latest
      continue-on-error: true
      permissions:
        # contents permission to clone the repository
        contents: read
        packages: read
        # issues and pull-requests permissions to write results as pull
        # request comments. Omit them if you don't need summary comments
        # issues: write
        # pull-requests: write
        # To report GitHub Actions status checks. Omit if you don't need
        # to update commit status
        # statuses: write

      steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            # super-linter needs the full git history to get the
            # list of files that changed across commits
            fetch-depth: 0
            persist-credentials: false

        - name: Super-linter
          uses: super-linter/super-linter@v8.6.0 # x-release-please-version
          env:
            # To report GitHub Actions status checks
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    JobTruffle:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
    JobCompile:
        # needs: [JobBuild, JobTruffle]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Compilation
              run: ./mvnw compile
#    JobTest:
#        needs: JobCompile
#        runs-on: ubuntu-latest
#        steps:
#            - uses: actions/checkout@v6
#            - name: Set up JDK 25
#              uses: actions/setup-java@v5
#              with:
#                java-version: 25
#                distribution: temurin
#                cache: maven
#            - name: Make mvnw executable
#              run: chmod +x ./mvnw
#            - name: Test
#              run: ./mvnw test
    JobVerify:
        needs: JobCompile
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Verify
              run: ./mvnw verify
            - name: UploadJacoco
              uses: actions/upload-artifact@v7
              with:
                name: jacoco.xml
                path: ./target/site/jacoco/jacoco.xml
                archive: false
            - name: UploadClasses
              uses: actions/upload-artifact@v7
              with:
                name: Classes.zip
                path: ./target/classes
    JobSonar:
        needs: JobVerify
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                # Disabling shallow clones is recommended for improving the relevancy of reporting
                fetch-depth: 0
            - name: Etape 1 - Affichage après création
              run: ls -lah
            - name: Etape 2 - Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: Classes.zip
                path: ./target/classes
            - name: Etape 2b - Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: jacoco.xml
                path: ./
            - name: Etape 3 - Affichage final
              run: ls -lah
            - name: SonarQube Scan
              uses: sonarsource/sonarcloud-github-action@master # Ex: v4.0.0, See the latest version at https://github.com/marketplace/actions/sonarcloud-scan
              with:
                args: >
                  -Dsonar.organization=nnisoft
                  -Dsonar.projectKey=nnisoft
                  -Dsonar.coverage.jacoco.xmlReportPaths=jacoco.xml
                  -Dsonar.java.binaries=./target/classes
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    JobPublish:
        needs: JobSonar
        runs-on: ubuntu-latest
        permissions:
          contents: read
          packages: write
          attestations: write
          id-token: write
        steps:
          - uses: actions/checkout@v6
            with:
              fetch-depth: 0
          - name: Set up JDK 25
            uses: actions/setup-java@v5
            with:
              java-version: 25
              distribution: temurin
              cache: maven


          - name: Make mvnw executable
            run: chmod +x ./mvnw
          - name: Verify
            run: ./mvnw verify -B
              
          -
            name: Login to DockerHub
            if: github.event_name != 'pull_request'
            uses: docker/login-action@v4
            with:
              #username: ${{ secrets.DOCKERHUB_USERNAME }}
              #password: ${{ secrets.DOCKERHUB_TOKEN }}
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}


          -
            name: Docker meta
            id: meta
            uses: docker/metadata-action@v6
            with:
              images: name/app


          -
            name: Build and push
            id: push
            uses: docker/build-push-action@v7
            with:
              context: .
              push: true
              tags: ghcr.io/nnisoft/tp-software-factory-apprenant:latest
              labels: ${{ steps.meta.outputs.labels }}    
    Jobdeploy-prod:
      name: Deploy to Production
      needs: JobPublish
      runs-on: ubuntu-latest
      environment: prod
      container: ghcr.io/railwayapp/cli:latest
      env:
        SVC_ID: tp-software-factory-nicolas
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_DEPLOY }}
      steps:
        - run: railway redeploy --service=${{ env.SVC_ID }} --yes