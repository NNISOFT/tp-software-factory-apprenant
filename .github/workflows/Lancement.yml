name: Lancer programme Java

on:
  push:
    branches: [ main ]

jobs:
    JobBuild:
      name: Lint
      runs-on: ubuntu-latest

      permissions:
        # contents permission to clone the repository
        contents: read
        packages: read
        # issues and pull-requests permissions to write results as pull
        # request comments. Omit them if you don't need summary comments
        # issues: write
        # pull-requests: write
        # To report GitHub Actions status checks. Omit if you don't need
        # to update commit status
        # statuses: write

      steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            # super-linter needs the full git history to get the
            # list of files that changed across commits
            fetch-depth: 0
            persist-credentials: false

        - name: Super-linter
          uses: super-linter/super-linter@v8.6.0 # x-release-please-version
          env:
            # To report GitHub Actions status checks
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    JobCompile:
        needs: JobBuild
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Compilation
              run: ./mvnw compile
#    JobTest:
#        needs: JobCompile
#        runs-on: ubuntu-latest
#        steps:
#            - uses: actions/checkout@v6
#            - name: Set up JDK 25
#              uses: actions/setup-java@v5
#              with:
#                java-version: 25
#                distribution: temurin
#                cache: maven
#            - name: Make mvnw executable
#              run: chmod +x ./mvnw
#            - name: Test
#              run: ./mvnw test
    JobVerify:
        needs: JobCompile
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Verify
              run: ./mvnw verify
            - name: Upload
              uses: actions/upload-artifact@v7
              with:
                name: jacoco.xml
                path: ./target/site/jacoco/jacoco.xml
                archive: false