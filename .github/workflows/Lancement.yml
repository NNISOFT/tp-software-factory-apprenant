name: Lancer programme Java

on:
  push:
    branches: [ main ]

jobs:
    JobBuild:
      name: Lint
      runs-on: ubuntu-latest
      continue-on-error: true
      permissions:
        # contents permission to clone the repository
        contents: read
        packages: read
        # issues and pull-requests permissions to write results as pull
        # request comments. Omit them if you don't need summary comments
        # issues: write
        # pull-requests: write
        # To report GitHub Actions status checks. Omit if you don't need
        # to update commit status
        # statuses: write

      steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            # super-linter needs the full git history to get the
            # list of files that changed across commits
            fetch-depth: 0
            persist-credentials: false

        - name: Super-linter
          uses: super-linter/super-linter@v8.6.0 # x-release-please-version
          env:
            # To report GitHub Actions status checks
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    JobTruffle:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
    JobCompile:
        needs: [JobBuild, JobTruffle]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Compilation
              run: ./mvnw compile
#    JobTest:
#        needs: JobCompile
#        runs-on: ubuntu-latest
#        steps:
#            - uses: actions/checkout@v6
#            - name: Set up JDK 25
#              uses: actions/setup-java@v5
#              with:
#                java-version: 25
#                distribution: temurin
#                cache: maven
#            - name: Make mvnw executable
#              run: chmod +x ./mvnw
#            - name: Test
#              run: ./mvnw test
    JobVerify:
        needs: JobCompile
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Verify
              run: ./mvnw verify
            - name: UploadJacoco
              uses: actions/upload-artifact@v7
              with:
                name: jacoco.xml
                path: ./target/site/jacoco/jacoco.xml
                archive: false
            - name: UploadClasses
              uses: actions/upload-artifact@v7
              with:
                name: Classes.zip
                path: ./target/classes
    JobSonar:
        needs: JobVerify
        runs-on: ubuntu-latest
        steps:
            - name: Etape 1 - Affichage après création
              run: ls -lah
            - name: Etape 2 - Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: Classes.zip
                path: ./
            - name: Etape 3 - Affichage final
              run: ls -lah
            - uses: actions/checkout@v6
              with:
                # Disabling shallow clones is recommended for improving the relevancy of reporting
                fetch-depth: 0
            - name: SonarQube Scan
              uses: sonarsource/sonarcloud-github-action@master # Ex: v4.0.0, See the latest version at https://github.com/marketplace/actions/sonarcloud-scan
              with:
                args: >
                  -Dsonar.organization=NNISOFT
                  -Dsonar.projectKey=7b7fc0c7eefd9b8dde27afbc0fc01524a3b15f58
                  -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
                  -Dsonar.sources=/target/classes
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}