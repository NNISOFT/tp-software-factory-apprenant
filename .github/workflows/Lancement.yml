name: Lancer programme Java

on:
  push:
    branches: [ main ]

jobs:
    JobCompile:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
                cache: maven
            - name: Make mvnw executable
              run: chmod +x ./mvnw
            - name: Compilation
              run: ./mvnw compile
