# Configuration de la base de données
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ma_base_de_donnees

# Stratégie de génération des tables (drop-and-create pour repartir à zéro à chaque fois)
quarkus.hibernate-orm.database.generation=drop-and-create

# Chemin vers le fichier SQL d'initialisation (chargé automatiquement au démarrage)
quarkus.hibernate-orm.sql-load-script=import.sql